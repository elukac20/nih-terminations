<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./index.css">
        <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    </head>
    <body>
        <div id="title">Grants not containing published list of flagged terms.</div>
        <div class="table-wrapper">
            <div id="table-noterms-container"></div>
        </div>


        <script>
                Papa.parse("../data/no_flagged_terms.csv", {
                    download: true,
                    complete: function(results) {
                        let table = "<table>";
                        results.data.forEach(row => {
                            table += "<tr>";
                            row.forEach(cell => {
                                table += `<td>${cell}</td>`;
                            });
                            table += "</tr>";
                        });
                        table += "</table>";
                        document.getElementById("table-noterms-container").innerHTML = table;
                    },
                    error: function(error) {
                        console.error("CSV Load Error:", error);
                    }
                });

                
            </script>
    </body>
</html>
